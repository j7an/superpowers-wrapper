version: 2
updates:
  # GitHub Actions (SHA-pinned, updated by Dependabot)
  - package-ecosystem: "github-actions"
    directory: "/"
    rebase-strategy: "disabled"
    cooldown:
      default-days: 5
    schedule:
      interval: "weekly"
      day: "monday"
      time: "18:00"
      timezone: "America/Los_Angeles"
    groups:
      all-actions:
        patterns: ["*"]
    commit-message:
      prefix: "deps"
