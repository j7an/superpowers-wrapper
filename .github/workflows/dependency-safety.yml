name: Dependency Safety

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  statuses: write
  issues: write

concurrency:
  group: dependency-safety-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  safety:
    # Real dependency-safety scan runs for Dependabot only; every other PR
    # gets the status-only gate in dependency-safety-non-bot-gate.yml.
    # `pull_request.user.login` is the spoofing-resistant actor field.
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    uses: j7an/shared-workflows/.github/workflows/dependency-safety.yml@a599e2cd5a46a55b396a2b4d59fbe97013f806d0 # v4.2.4
    with:
      auto_merge: true
      release_age_policy: advisory
      minimum_release_age_days: 5
