name: Tag Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump (auto = infer from Conventional Commits since last tag)"
        type: choice
        required: true
        default: auto
        options:
          - auto
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  tag:
    uses: j7an/shared-workflows/.github/workflows/tag-release.yml@a599e2cd5a46a55b396a2b4d59fbe97013f806d0 # v4.2.4
    with:
      bump: ${{ inputs.bump }}
      tag-prefix: "v"
    secrets:
      RELEASE_BOT_PRIVATE_KEY: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
