name: Tag Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump (auto = infer from Conventional Commits since last tag)"
        type: choice
        required: true
        default: auto
        options:
          - auto
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  tag:
    uses: j7an/shared-workflows/.github/workflows/tag-release.yml@dc9105acf09a4ad43bad2e4a86f4c65f553fe3c0 # v4.2.2
    with:
      bump: ${{ inputs.bump }}
      tag-prefix: "v"
    secrets:
      RELEASE_BOT_PRIVATE_KEY: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
