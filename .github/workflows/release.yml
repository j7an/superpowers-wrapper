name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  publish:
    permissions:
      contents: write   # GitHub release, created by the reusable workflow
      id-token: write   # npm trusted publishing; validated against THIS workflow's filename
    uses: j7an/shared-workflows/.github/workflows/publish-npm.yml@dc9105acf09a4ad43bad2e4a86f4c65f553fe3c0 # v4.2.2
    with:
      tag: ${{ github.ref_name }}
      package-name: superpowers-wrapper
      test-command: sh tests/run.sh
      pack-contents-script: tests/assert_pack_contents.sh
      verify-command: 'test "$(npx --yes "${PACKAGE}@${VERSION}" --version)" = "$VERSION"'
