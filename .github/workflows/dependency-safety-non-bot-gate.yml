name: Dependency Safety Non-Bot Gate

on:
  pull_request_target: # zizmor: ignore[dangerous-triggers] status-only path; never checks out or runs PR code
    types: [opened, synchronize, reopened]
    branches: [main]

permissions: {}

concurrency:
  group: dep-safety-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  gate:
    permissions:
      statuses: write
    uses: j7an/shared-workflows/.github/workflows/dependency-safety-non-bot-gate.yml@a599e2cd5a46a55b396a2b4d59fbe97013f806d0 # v4.2.4
